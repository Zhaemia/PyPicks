<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pypicks</title>
</head>
<body>
    <input
        type = "search"
        id="player_Search"
        required
        >
     <button
        type="submit"
        id="player_search_Button"
         >
        Submit
    </button>
    <ul id="player_list" >
    </ul>
    <div id="player_data">
    </div>
    <p id="predictionChance"></p>
    <script>
        const button_click = document.getElementById("player_search_Button");
        button_click.addEventListener("click", function(){
            const player = document.getElementById("player_Search");
            const selection = player.value;
            fetch(`/player/${selection}`)
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    var ul = document.querySelector("#player_list");
                    ul.innerHTML = "";
                    data.forEach(element => { 
                        var li = document.createElement('li');
                        li.textContent = element['full_name'];
                        li.addEventListener('click',   () => {

                            fetch(`/logs/${element['id']}`)
                                .then(response => {
                                    return response.json();
                                })
                                .then(data => {
                                    console.log(JSON.stringify(data[0]));
                                    const table = document.createElement('table');
                                    const keys = Object.keys(data);
                                    const tableCatHeaders = document.createElement('th');
                                    const tableCatRows = document.createElement('tr');

                                    const th1 = document.createElement('th');
                                    th1.textContent = 'Matchup';
                                    tableCatRows.appendChild(th1);

                                    const th2 = document.createElement('th');
                                    th2.textContent = 'Points';
                                    tableCatRows.appendChild(th2);
                                    
                                     const th3 = document.createElement('th');
                                    th3.textContent = 'Rebounds';
                                    tableCatRows.appendChild(th3);

                                     const th4 = document.createElement('th');
                                    th4.textContent = 'Assist';
                                    tableCatRows.appendChild(th4);

                                     const th5 = document.createElement('th');
                                    th5.textContent = 'PRA';
                                    tableCatRows.appendChild(th5);

                                     const th6= document.createElement('th');
                                    th6.textContent = 'PA';
                                    tableCatRows.appendChild(th6);

                                     const th7 = document.createElement('th');
                                    th7.textContent = 'RA';
                                    tableCatRows.appendChild(th7);

                                    document.body.append(tableCatRows);

                                    data.forEach(element =>{

                                        const tableRow = document.createElement('tr');
                                        const td = document.createElement('td');
                                        

                                        const matchup = document.createElement('td');
                                        matchup.textContent = element['MATCHUP'];
                                        tableRow.appendChild(matchup);

                                        const pts = document.createElement('td');
                                        pts.textContent = element['PTS'];
                                        tableRow.appendChild(pts);

                                        const reb = document.createElement('td');
                                        reb.textContent = element['REB'];
                                        tableRow.appendChild(reb);


                                        const ast = document.createElement('td');
                                        ast.textContent = element['AST'];
                                        tableRow.appendChild(ast);

                                        const pra = document.createElement('td');
                                        pra.textContent = element['PRA'];
                                        tableRow.appendChild(pra);

                                        const pa = document.createElement('td');
                                        pa.textContent = element['PA'];
                                        tableRow.appendChild(pa);


                                        const ra = document.createElement('td');
                                        ra.textContent = element['RA'];
                                        tableRow.appendChild(ra);

                                        table.appendChild(tableRow);
                                    })
                                    document.body.appendChild(table);

                                    return data
                                })
                                .then(statLogs =>{
                                   const statSearchCat = document.createElement('input')
                                   statSearchCat.id= 'statSearchCat';

                                   statSearchCat.placeholder= "Select a stat cat"
                                   const line = document.createElement('input')
                                   line.id ='line';
                                   line.placeholder= "Select a line"
                                  
                                   
                                   const sButton = document.createElement('button')
                                   sButton.type= 'button';
                                   sButton.id= 'sButton';
                                   sButton.textContent = "Submit"

                                   document.body.appendChild(statSearchCat);

                                   document.body.appendChild(line);

                                   document.body.appendChild(sButton);

                                   const sButtonClick = sButton.addEventListener('click', function(){
                                        console.log("button clicked")
                                        const selectedStatCat = document.getElementById('statSearchCat').value;
                                        const selectedLine = document.getElementById('line').value;

                                        fetch(`/prediction/${element['id']}/${selectedStatCat}/${selectedLine}`)
                                            .then(response => {
                                                return response.text()
                                            })

                                            .then(data =>{
                                                console.log(data)
                                                p = document.getElementById('predictionChance')
                                                p.textContent = data;
                                                console.log(p.textContent);
                                    
                                            })

                                            .catch(error => {
                                                console.log("Error dectected")
                                        });
                                   });
                                })
                                .catch( error => {
                                    console.log('bad data')
                                });
                        });
                        ul.appendChild(li)          
                    });   
                })
                .catch(error =>{
                    console.log("Error")
                });
        });
    </script>
</body>
</html>
